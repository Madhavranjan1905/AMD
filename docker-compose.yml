version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: doctor_patient_postgres
    environment:
      POSTGRES_USER: doctor_user
      POSTGRES_PASSWORD: doctor_password
      POSTGRES_DB: doctor_patient_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doctor_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: doctor_patient_backend
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: doctor_user
      DB_PASSWORD: doctor_password
      DB_NAME: doctor_patient_db
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
